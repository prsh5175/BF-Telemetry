name: Package Release

on:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create release package
        run: |
          # Create a clean directory for packaging
          mkdir -p BF-Telemetry-release
          
          # Copy only necessary files for end users
          cp -r WIDGETS BF-Telemetry-release/
          cp -r SOUNDS BF-Telemetry-release/
          cp -r SCRIPTS BF-Telemetry-release/
          cp README.MD BF-Telemetry-release/
          
          # Create ZIP archive
          zip -r BF-Telemetry-release.zip BF-Telemetry-release/
          
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./BF-Telemetry-release.zip
          asset_name: BF-Telemetry-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip
